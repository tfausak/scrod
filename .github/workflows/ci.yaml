name: CI
on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
jobs:
  meta:
    name: Meta
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - id: name
        run: "echo name=$( grep ^name: *.cabal | cut -d ' ' -f 2 ) >> $GITHUB_OUTPUT"
      - id: version
        run: "echo version=$( grep ^version: *.cabal | cut -d ' ' -f 2 ) >> $GITHUB_OUTPUT"
    outputs:
      name: ${{ steps.name.outputs.name }}
      version: ${{ steps.version.outputs.version }}
  gild:
    name: Gild
    needs: meta
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: cachix/install-nix-action@v30
      - run: nix-shell --run 'cabal-gild --input ${{ needs.meta.outputs.name }}.cabal --mode check'
  build:
    name: Build
    needs: meta
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: cachix/install-nix-action@v30
      - run: mkdir artifact
      - run: nix-shell --run 'ghc-pkg list'
      - run: nix-shell --run 'cabal sdist --output-dir artifact'
      - run: nix-shell --run 'cabal configure --enable-documentation --enable-tests --flags=pedantic --ghc-options=-fwrite-ide-info --haddock-for-hackage --jobs'
      - run: cat cabal.project.local
      - run: cp cabal.project.local artifact
      - run: nix-shell --run 'cabal update'
      - run: nix-shell --run 'cabal freeze'
      - run: cat cabal.project.freeze
      - run: cp cabal.project.freeze artifact
      - run: nix-shell --run 'cabal outdated --v2-freeze-file'
      - uses: actions/cache@v5
        with:
          key: ${{ hashFiles('cabal.project.freeze') }}
          path: ~/.local/state/cabal
      - run: nix-shell --run 'cabal build --only-download'
      - run: nix-shell --run 'cabal build --only-dependencies'
      - run: nix-shell --run 'cabal build'
      - run: cp dist-newstyle/${{ needs.meta.outputs.name }}-${{ needs.meta.outputs.version }}-docs.tar.gz artifact
      - run: cp $( nix-shell --run 'cabal list-bin scrod' ) artifact
      - run: tar --create --file artifact.tar --verbose artifact
      - uses: actions/upload-artifact@v6
        with:
          name: scrod-${{ github.sha }}
          path: artifact.tar
      - run: nix-shell --run 'cabal run -- scrod-test-suite'
      - run: find dist-newstyle -name '*.hie' | tar --create --file hie.tar -T -
      - uses: actions/upload-artifact@v6
        with:
          name: hie-${{ github.sha }}
          path: hie.tar
  cabal:
    name: Cabal
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: cachix/install-nix-action@v30
      - run: nix-shell --run 'cabal check'
  hlint:
    name: HLint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: cachix/install-nix-action@v30
      - run: nix-shell --run 'hlint .'
  ormolu:
    name: Ormolu
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: cachix/install-nix-action@v30
      - run: nix-shell --run 'ormolu --mode check $(git ls-files "*.hs")'
  weeder:
    name: Weeder
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: cachix/install-nix-action@v30
      - uses: actions/download-artifact@v6
        with:
          name: hie-${{ github.sha }}
      - run: tar --extract --file hie.tar --verbose
      - run: nix-shell --run weeder
